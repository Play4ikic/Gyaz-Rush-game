<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne - Draft Battle</title>
    <link rel="stylesheet" href="draft.css">
</head>
<body>

    <div id="intro-screen" class="screen hidden" style="background: radial-gradient(circle, #1a1a1a, #000); z-index: 1000;">
        <div class="intro-container">
            <div id="intro-player" class="intro-name left-name">ИГРОК</div>
            <div class="intro-vs">VS</div>
            <div id="intro-opponent" class="intro-name right-name">СОПЕРНИК</div>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <h1 class="logo-text">READY FOR BATTLE?</h1>
        <div class="difficulty-box">
            <button class="battle-btn bot-btn" onclick="runBotGame()">В БОЙ (3000 CY)</button>
            <button class="battle-btn online-btn" onclick="runOnlineGame()">ОНЛАЙН БИТВА</button>
        </div>
        <a href="index.html" class="back-link">НАЗАД В ХАБ</a>
    </div>

    <div id="game-screen" class="screen hidden">
        <header class="game-header">
            <div class="score">
                <span id="p-name" style="color: #fff;">ВЫ</span> 
                <span id="p-score" style="color:#00ff88; font-size: 24px; margin-left: 10px;">0</span> 
                <span style="margin: 0 10px;">:</span> 
                <span id="b-score" style="color:#ff4d4d; font-size: 24px; margin-right: 10px;">0</span> 
                <span id="opp-name" style="color: #fff;">ВРАГ</span>
            </div>
            <div id="timer-box">⏱ <span id="timer">7</span></div>
        </header>

        <div class="battle-arena">
            <div class="card-placeholder" id="player-card-display"></div>
            <div class="vs-text">VS</div>
            <div class="card-placeholder card-back" id="bot-card-display"></div>
        </div>

        <div class="squad-selection">
            <h3>РАУНД <span id="round-num" style="color:#f1c40f;">1</span> / 5</h3>
            <div id="squad-hand" class="hand-grid"></div>
        </div>
    </div>

    <script>
        function runBotGame() { if (window.startGameBot) window.startGameBot(); else alert("Ошибка загрузки!"); }
        function runOnlineGame() { if (window.startOnlineSearch) window.startOnlineSearch(); else alert("Ошибка загрузки!"); }
        
        // Функция для запуска крутого интро
        window.showBattleIntro = function(playerName, oppName, callback) {
            const intro = document.getElementById('intro-screen');
            document.getElementById('intro-player').innerText = playerName.toUpperCase();
            document.getElementById('intro-opponent').innerText = oppName.toUpperCase();
            
            intro.classList.remove('hidden');
            
            // Через 3 секунды убираем интро и запускаем игру
            setTimeout(() => {
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.classList.add('hidden');
                    intro.style.opacity = '1';
                    if(callback) callback();
                }, 500);
            }, 3000);
        };
    </script>

    <script src="audio.js"></script>
    <script type="module" src="draft.js"></script>
    <script type="module" src="online_draft.js"></script>
</body>
</html>
