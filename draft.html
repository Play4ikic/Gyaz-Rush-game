<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FixOne - Draft Battle</title>
    <link rel="stylesheet" href="draft.css">
    <style>
        .online-btn {
            background: linear-gradient(45deg, #00c6ff, #0072ff) !important;
            margin-top: 15px;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #fff;
            cursor: pointer;
            font-weight: bold;
            display: block;
            width: 100%;
        }
        .difficulty-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1 class="logo-text">READY FOR BATTLE?</h1>
        
        <div class="difficulty-box">
            <button class="battle-btn" onclick="startGame()">В БОЙ С БОТОМ (3000 CY)</button>
            
            <button id="online-search-btn" class="battle-btn online-btn">ОНЛАЙН БИТВА (ПОИСК)</button>
        </div>

        <a href="hub.html" class="back-link">НАЗАД В ХАБ</a>
    </div>

    <div id="game-screen" class="screen hidden">
        <header class="game-header">
            <div class="score">ИГРОК <span id="p-score">0</span> : <span id="b-score">0</span> БОТ</div>
            <div id="timer-box">ТАЙМЕР: <span id="timer">7</span></div>
            <div class="coins-info">БАЛАНС: <span id="user-coins">0</span> CY</div>
        </header>
        <div class="battle-arena">
            <div id="player-card-display" class="card-placeholder"></div>
            <div class="vs-text">VS</div>
            <div id="bot-card-display" class="card-placeholder card-back"></div>
        </div>
        <div id="squad-hand" class="hand-grid"></div>
    </div>

    <div class="audio-controls" style="position: fixed; bottom: 10px; right: 10px; z-index: 100;">
        <button onclick="toggleMute()" style="background:none; border:none; font-size:20px; cursor:pointer;">🎵</button>
    </div>

    <script src="audio.js"></script>
    <script src="draft.js"></script>
    
    <script type="module">
        import { startOnlineSearch } from './online_draft.js';
        
        // Привязываем функцию к кнопке вручную, чтобы точно сработало
        const btn = document.getElementById('online-search-btn');
        if (btn) {
            btn.addEventListener('click', () => {
                console.log("Поиск онлайн игры запущен...");
                startOnlineSearch();
            });
        }
    </script>
</body>
</html>
