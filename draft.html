<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYaz Rush - Football Draft 1v1</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ */
        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
        }

        .hidden { display: none !important; }

        /* ЭКРАН МЕНЮ (SETUP) */
        #setup-screen { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        .logo-text { 
            font-size: 50px; 
            color: #e1b12c; 
            margin-bottom: 40px; 
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(225, 177, 44, 0.4);
        }

        .menu-btn { 
            padding: 18px 50px; 
            font-size: 20px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            background: #e1b12c; 
            color: #000;
            font-weight: 900; 
            margin: 12px;
            transition: 0.3s;
            width: 280px;
            text-transform: uppercase;
        }

        .menu-btn:hover { 
            transform: scale(1.05); 
            background: #f1c40f; 
            box-shadow: 0 0 20px rgba(225, 177, 44, 0.6);
        }

        /* МОДАЛЬНОЕ ОКНО ОНЛАЙНА */
        #online-modal { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }

        .modal-content { 
            position: relative; 
            background: #111; 
            padding: 10px; 
            border-radius: 20px; 
            border: 2px solid #e1b12c;
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe { 
            border: none; 
            border-radius: 10px; 
            background: #0b0b0b; 
        }

        /* ИГРОВОЙ ЭКРАН (АРЕНА) */
        #game-screen { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 30px; 
            background: url('stadium_bg.jpg') center/cover; /* Если есть фон стадиона */
        }

        .hud {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .timer-circle {
            width: 60px; height: 60px;
            border: 4px solid #e1b12c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
        }

        .score-board {
            font-size: 40px;
            font-weight: 900;
            background: rgba(0,0,0,0.7);
            padding: 10px 30px;
            border-radius: 15px;
            border-bottom: 3px solid #e1b12c;
        }

        #battle-area { 
            display: flex; 
            gap: 50px; 
            margin-top: 20px; 
        }

        .card-slot { 
            width: 200px; 
            height: 290px; 
            border: 3px dashed rgba(225, 177, 44, 0.3); 
            border-radius: 15px; 
            position: relative;
            background: rgba(255,255,255,0.02);
        }

        .card-back { 
            background: #1a1a1a url('card_back.png') center/contain no-repeat; 
            border: 3px solid #e1b12c;
        }

        /* РУКА ИГРОКА (КАРТЫ) */
        #squad-hand { 
            position: fixed; 
            bottom: 30px; 
            display: flex; 
            gap: 15px; 
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #squad-hand img { 
            width: 110px; 
            cursor: pointer; 
            transition: transform 0.2s, filter 0.2s; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        #squad-hand img:hover { 
            transform: translateY(-20px) scale(1.1); 
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 class="logo-text">GYAZ RUSH</h1>
        <button class="menu-btn" onclick="alert('Скоро появится!')">ОДИНОЧНЫЙ ДРАФТ</button>
        <button class="menu-btn" onclick="openOnlineModal()" style="background: #e1b12c; color: #000;">БИТВА 1v1 ONLINE</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="hud">
            <div class="timer-circle" id="timer">7</div>
            <div class="score-board">
                <span id="p-score">0</span> : <span id="b-score">0</span>
            </div>
            <div style="color: #e1b12c; font-weight: bold; letter-spacing: 2px;">РАУНД <span id="round-num">1</span>/5</div>
        </div>
        
        <div id="battle-area">
            <div id="player-card-display" class="card-slot">
                </div>
            <div id="bot-card-display" class="card-slot card-back">
                </div>
        </div>

        <div id="squad-hand">
            </div>
    </div>

    <div id="online-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeOnlineModal()">ЗАКРЫТЬ</button>
            <iframe src="1v1.html" width="550" height="600"></iframe>
        </div>
    </div>

    <script type="module" src="online_draft.js"></script>

    <script>
        /**
         * АВТО-ПРОВЕРКА СОСТОЯНИЯ (КРИТИЧНО)
         * Срабатывает мгновенно при загрузке страницы.
         */
        (function initEngine() {
            const matchId = localStorage.getItem('currentMatchId');
            const myRole = localStorage.getItem('myRole');

            // Если данные о матче есть в памяти — сразу включаем поле боя
            if (matchId && myRole) {
                console.log("ВНИМАНИЕ: Обнаружена активная сессия 1v1. Запуск арены...");
                
                // Используем window.onload или проверку элементов, чтобы убедиться что HTML готов
                window.addEventListener('DOMContentLoaded', () => {
                    const setup = document.getElementById('setup-screen');
                    const game = document.getElementById('game-screen');
                    
                    if (setup && game) {
                        setup.classList.add('hidden');
                        game.classList.remove('hidden');
                    }
                });
            }
        })();

        // Функции кнопок
        function openOnlineModal() {
            document.getElementById('online-modal').style.display = 'flex';
        }

        function closeOnlineModal() {
            document.getElementById('online-modal').style.display = 'none';
        }
    </script>
</body>
</html>
