<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne - Draft Battle</title>
    <link rel="stylesheet" href="draft.css">
    <style>
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        .screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }

        /* НОВАЯ КНОПКА FIXONE */
        .fixone-btn-container {
            position: relative;
            margin-top: 20px;
        }

        .main-battle-btn {
            background: linear-gradient(135deg, #e1b12c 0%, #f1c40f 100%);
            color: #000;
            padding: 20px 60px;
            font-size: 22px;
            font-weight: 900;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 25px rgba(225, 177, 44, 0.5);
            transition: all 0.3s ease;
        }

        .main-battle-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 30px rgba(225, 177, 44, 0.7);
            filter: brightness(1.1);
        }

        .main-battle-btn:active { transform: scale(0.98); }

        .price-tag {
            display: block;
            font-size: 14px;
            margin-top: 10px;
            color: #e1b12c;
            font-weight: bold;
        }

        /* Арена боя */
        .card-placeholder {
            width: 130px; height: 185px;
            border: 2px dashed #444; border-radius: 10px;
            background: rgba(255,255,255,0.05); overflow: hidden;
        }
        .card-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .card-back { background: #111; border: 2px solid #555; position: relative; }
        .card-back::after { content: "FIXONE"; color: #333; position: absolute; top: 45%; left: 15%; font-weight: 900; transform: rotate(-20deg); }

        .hand-grid img { width: 75px; margin: 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .used-card { filter: grayscale(1) opacity(0.3) !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1 style="font-size: 50px; margin-bottom: 5px; color: #fff;">DRAFT BATTLE</h1>
        <p style="color: #666; margin-bottom: 30px;">СОБЕРИ СОСТАВ И ВЫИГРАЙ 3000 CY</p>
        
        <div class="fixone-btn-container">
            <button id="start-battle-trigger" class="main-battle-btn">В БОЙ</button>
            <span class="price-tag">СТОИМОСТЬ: 3000 CY</span>
        </div>

        <a href="index.html" style="color: #444; text-decoration: none; margin-top: 40px; font-size: 14px;">НАЗАД В ХАБ</a>
    </div>

    <div id="game-screen" class="screen hidden" style="justify-content: flex-start; padding-top: 30px;">
        <header style="width: 90%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div style="font-size: 20px; background: #222; padding: 10px 20px; border-radius: 8px;">
                <span id="p-score">0</span> : <span id="b-score">0</span>
            </div>
            <div style="font-size: 24px; color: #e1b12c; font-weight: bold;">⏱ <span id="timer">7</span></div>
            <div style="font-size: 18px;">💰 <span id="user-coins-display">0</span> CY</div>
        </header>

        <div style="display: flex; align-items: center; gap: 40px; margin-bottom: 50px;">
            <div id="player-card-display" class="card-placeholder"></div>
            <div style="font-size: 40px; font-weight: 900; color: #333;">VS</div>
            <div id="bot-card-display" class="card-placeholder card-back"></div>
        </div>

        <div>
            <h3 style="margin-bottom: 15px;">РАУНД <span id="round-num">1</span> / 5</h3>
            <div id="squad-hand" class="hand-grid" style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px;"></div>
        </div>
    </div>

    <script type="module" src="draft.js"></script>
</body>
</html>
