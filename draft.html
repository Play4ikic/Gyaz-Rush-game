<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne - Draft Battle</title>
    <link rel="stylesheet" href="draft.css">
    <style>
        body { background: #000; margin: 0; font-family: sans-serif; overflow: hidden; color: white; }
        .screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.3s; }
        .hidden { display: none !important; }
        
        .difficulty-box { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 350px; }

        .battle-btn {
            width: 100%; padding: 18px; font-size: 18px; font-weight: bold;
            border-radius: 50px; border: none; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }

        .bot-btn { background: #e1b12c; color: #000; box-shadow: 0 0 15px rgba(225, 177, 44, 0.4); }
        .bot-btn:hover { transform: scale(1.05); }

        .online-btn { 
            background: linear-gradient(45deg, #0097e6, #8c7ae6); 
            color: white; border: 2px solid white;
            box-shadow: 0 0 20px rgba(0, 151, 230, 0.6);
        }

        .card-placeholder { width: 120px; height: 170px; border: 2px dashed #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .card-back { background: #111; border: 2px solid #444; }
        .vs-text { font-size: 30px; font-weight: bold; color: white; }

        .hand-grid img { width: 70px; margin: 5px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .used-card { filter: grayscale(1) opacity(0.3) !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1 class="logo-text" style="font-size: 40px; margin-bottom: 40px;">READY FOR BATTLE?</h1>
        
        <div class="difficulty-box">
            <button class="battle-btn bot-btn" onclick="runBotGame()">
                В БОЙ (3000 CY)
            </button>
            
            <button class="battle-btn online-btn" onclick="runOnlineGame()">
                ОНЛАЙН БИТВА
            </button>
        </div>

        <a href="index.html" style="color: #555; text-decoration: none; margin-top: 30px; font-size: 14px;">НАЗАД В ХАБ</a>
    </div>

    <div id="game-screen" class="screen hidden" style="justify-content: flex-start; padding-top: 20px;">
        <header style="width: 90%; display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold;">
            <div class="score">
                <span id="p-name">ИГРОК</span> <span id="p-score" style="color:#00ff88;">0</span> 
                : 
                <span id="b-score" style="color:#ff4d4d;">0</span> <span id="opp-name">ВРАГ</span>
            </div>
            <div id="timer-box">⏱ <span id="timer">7</span></div>
        </header>

        <div class="battle-arena" style="display: flex; align-items: center; gap: 30px; margin-bottom: 40px; justify-content: center;">
            <div id="player-card-display" class="card-placeholder"></div>
            <div class="vs-text">VS</div>
            <div id="bot-card-display" class="card-placeholder card-back"></div>
        </div>

        <div class="squad-selection">
            <h3 style="margin-bottom: 15px;">РАУНД <span id="round-num" style="color:#e1b12c;">1</span> / 5</h3>
            <div id="squad-hand" class="hand-grid" style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px;"></div>
        </div>
    </div>

    <script>
        function runBotGame() {
            if (window.startGameBot) {
                window.startGameBot();
            } else {
                console.error("Ошибка: draft.js не загружен.");
                alert("Ошибка: Скрипт не готов. Попробуй обновить страницу (Ctrl+F5).");
            }
        }

        function runOnlineGame() {
            if (window.startOnlineSearch) {
                window.startOnlineSearch();
            } else {
                alert("Онлайн режим загружается...");
            }
        }
    </script>

    <script src="audio.js"></script>
    
    <script src="draft.js"></script> 
    
    <script type="module" src="online_draft.js"></script>

</body>
</html>
