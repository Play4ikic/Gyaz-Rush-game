<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne - Draft Battle</title>
    <link rel="stylesheet" href="draft.css">
    <style>
        body { background: #000; margin: 0; font-family: sans-serif; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
        
        .difficulty-box { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 100%; 
            max-width: 350px; 
        }

        .battle-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .bot-btn { background: #e1b12c; color: #000; box-shadow: 0 0 15px rgba(225, 177, 44, 0.4); }
        .online-btn { 
            background: linear-gradient(45deg, #0097e6, #8c7ae6); 
            color: white; 
            border: 2px solid white;
            box-shadow: 0 0 20px rgba(0, 151, 230, 0.6);
        }

        .online-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .used-card { filter: grayscale(1) opacity(0.5); pointer-events: none; }
        .hand-grid img { width: 70px; margin: 5px; border-radius: 5px; cursor: pointer; }
        
        .card-placeholder { width: 120px; height: 170px; border: 2px dashed #333; }
        .card-back { background: #111; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1 class="logo-text" style="color: white; font-size: 40px; margin-bottom: 40px;">READY FOR BATTLE?</h1>
        
        <div class="difficulty-box">
            <button id="start-bot-btn" class="battle-btn bot-btn">В БОЙ (3000 CY)</button>
            
            <button id="start-online-btn" class="battle-btn online-btn">ОНЛАЙН БИТВА</button>
        </div>

        <a href="index.html" class="back-link" style="color: #555; text-decoration: none; margin-top: 30px;">НАЗАД В ХАБ</a>
    </div>

    <div id="game-screen" class="screen hidden" style="justify-content: flex-start; padding-top: 20px;">
        <header class="game-header" style="color: white; width: 90%; display: flex; justify-content: space-between; margin-bottom: 30px;">
            <div class="score">ИГРОК <span id="p-score">0</span> : <span id="b-score">0</span> ВРАГ</div>
            <div id="timer-box">ТАЙМЕР: <span id="timer">7</span></div>
            <div class="coins-info">БАЛАНС: <span id="user-coins">0</span> CY</div>
        </header>

        <div class="battle-arena" style="display: flex; align-items: center; gap: 30px; margin-bottom: 40px;">
            <div id="player-card-display" class="card-placeholder"></div>
            <div class="vs-text" style="color: white; font-size: 30px; font-weight: bold;">VS</div>
            <div id="bot-card-display" class="card-placeholder card-back"></div>
        </div>

        <div class="squad-selection" style="color: white;">
            <h3>РАУНД <span id="round-num">1</span>/5</h3>
            <div id="squad-hand" class="hand-grid" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script type="module" src="draft.js"></script>
    <script type="module" src="online_draft.js"></script>

</body>
</html>
