<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne - Рынок</title>
    <link rel="stylesheet" href="market.css">
    <script type="module" src="economy.js"></script>
    <script type="module" src="market.js"></script>
</head>
<body>
    <div class="market-wrapper">
        <header class="market-header">
            <a href="index.html" class="back-btn">← В МЕНЮ</a>
            <h1>ТРАНСФЕРНЫЙ РЫНОК</h1>
            <div id="balance-display" class="balance-board">Загрузка...</div>
        </header>

        <div class="market-info">
            <p>Здесь ты можешь продать своих игроков. <br> 
            <span class="price-tag toty">TOTY: 10,000 CY</span> | <span class="price-tag champions">Champions: 5,000 CY</span></p>
        </div>

        <main class="market-content">
            <div id="market-list" class="market-grid">
                </div>
        </main>
    </div>

    <div class="audio-controls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999; display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;">
        <button onclick="this.innerText = (typeof toggleMute === 'function' && toggleMute()) ? '🔇' : '🎵'" style="background: none; border: none; font-size: 20px; cursor: pointer;">🎵</button>
        <input type="range" min="0" max="1" step="0.1" value="0.3" oninput="if(typeof setVolume === 'function') setVolume(this.value)" style="width: 60px; cursor: pointer;">
    </div>

    <script src="audio.js"></script>
</body>
</html>
