<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FixOne Shop - Special Packs</title>
    <link rel="stylesheet" href="shop.css">
</head>
<body>
    <div class="shop-wrapper">
        <header class="shop-header">
            <a href="index.html" class="back-btn">← В МЕНЮ</a>
            <h1 class="shop-title">Goalyaz SHOP</h1>
            <div id="shop-balance" class="balance-board">0 CY</div>
        </header>

        <main class="shop-content">
            <div class="pack-container">
                <div class="pack-card gold-card">
                    <div class="pack-visual">
                        <img src="images/gold.png" alt="Gold" class="pack-img">
                    </div>
                    <div class="pack-info">
                        <h2>GOLD PACK</h2>
                        <div class="pack-price">5,000 CY</div>
                        <button class="buy-button" onclick="openPack('gold', '')">ОТКРЫТЬ</button>
                    </div>
                </div>

                <div class="pack-card champions-card">
                    <div class="pack-visual">
                        <img src="images/champions league.jpg" alt="UCL" class="pack-img">
                    </div>
                    <div class="pack-info">
                        <h2>CHAMPIONS PACK</h2>
                        <div class="pack-price">50,000 CY</div>
                        <button class="buy-button" onclick="openPack('champions', 'анимация 2.mp4')">ОТКРЫТЬ</button>
                    </div>
                </div>

                <div class="pack-card toty-card">
                    <div class="pack-visual">
                        <img src="images/toty.jpg" alt="TOTY" class="pack-img">
                    </div>
                    <div class="pack-info">
                        <h2>TOTY PACK</h2>
                        <div class="pack-price">100,000 CY</div>
                        <button class="buy-button" onclick="openPack('toty', 'анимация.mp4')">ОТКРЫТЬ</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="video-reveal-container" class="hidden">
        <video id="pack-video" playsinline preload="auto">
            <source src="" type="video/mp4">
        </video>
        <div id="video-overlay" class="hidden">
            <div id="reveal-country-cont" class="reveal-text">
                <img src="images/Flag.jpg" class="flag-reveal-icon">
            </div> 
            <div id="reveal-pos" class="reveal-text">ST</div>
            <div id="reveal-club-img-cont" class="reveal-text">
                <img src="" id="reveal-club-icon" class="club-reveal-icon">
            </div>
        </div>
    </div>

    <div id="reveal-screen" class="hidden">
        <div class="overlay"></div>
        <div class="reveal-container">
            <img src="" id="card-res-img" class="final-player-image">
            <button class="claim-button">ЗАБРАТЬ В СОСТАВ</button>
        </div>
    </div>

    <script src="economy.js"></script>
    <script src="shop.js"></script>
</body>
</html>
<div class="audio-controls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999; display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;">
    <button onclick="this.innerText = toggleMute() ? '🔇' : '🎵'" style="background: none; border: none; font-size: 20px; cursor: pointer;">🎵</button>
    <input type="range" min="0" max="1" step="0.1" value="0.3" oninput="setVolume(this.value)" style="width: 60px; cursor: pointer;">
</div>

<script src="audio.js"></script>
