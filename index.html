<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FixOne FC - Hub</title>
    <style>
        /* Добавим стиль для модального окна */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: none; /* Скрыто по умолчанию */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 90%;
            max-width: 500px;
            background: #111;
            border-radius: 20px;
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 11;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="logo" style="font-weight: 900; color: #fff; letter-spacing: 2px;">GYaz Rush</div>
        
        <nav class="menu-tabs">
            <div class="tab-item active" onclick="selectTab('news')">НОВОСТИ</div>
            <div class="tab-item" onclick="selectTab('shop')">МАГАЗИН</div>
            <div class="tab-item" onclick="selectTab('club')">КЛУБ</div>
            <div class="tab-item" onclick="selectTab('draft')">DRAFT</div>
            <div class="tab-item" onclick="selectTab('market')">РЫНОК</div>
            <div class="tab-item" onclick="selectTab('betting')">СТАВКИ</div>
            <div class="tab-item" onclick="openOnline()" style="color: #e1b12c;">ЛЮДИ</div>
        </nav>

        <div class="right-side">
            <div class="business-container" onclick="collectBusinessMoney()">
                <span class="business-label">Бизнес (Собрать)</span>
                <span id="business-display" class="business-money">0 / 6000 CY</span>
            </div>
            <div id="shop-balance" class="balance-display">0 CY</div>
        </div>
    </header>

    <div id="online-modal" class="modal-overlay" onclick="closeOnline(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeOnline()">&times;</span>
            <iframe src="online.html" style="width: 100%; height: 500px; border: none;"></iframe>
        </div>
    </div>

    <main class="content-preview">...</main>

    <script>
        function openOnline() {
            document.getElementById('online-modal').style.display = 'flex';
        }

        function closeOnline(event) {
            document.getElementById('online-modal').style.display = 'none';
        }
    </script>

    <script type="module" src="economy.js"></script>
    <script type="module" src="business.js"></script>
    <script src="audio.js"></script>
    <script src="script.js"></script>
</body>
</html>
