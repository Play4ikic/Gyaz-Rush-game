<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FixOne FC - Hub</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ВОЗВРАТ ПРЕЖНЕГО СТИЛЯ */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 100;
        }

        .business-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            min-width: 120px;
            margin-right: 15px;
        }

        .business-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .business-money { color: #00ff88; font-weight: bold; font-family: monospace; }

        /* УВЕЛИЧЕННЫЙ ВИДЖЕТ PASS (Левый нижний угол) */
        .pass-widget {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 300px; /* Немного увеличил для надписи */
            z-index: 1000;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .pass-widget:hover { transform: scale(1.05); }
        .pass-widget:active { transform: scale(0.95); }

        .pass-card {
            background: linear-gradient(180deg, #f1c40f 0%, #d4ac0d 100%);
            border: 5px solid #000;
            border-radius: 18px;
            padding: 12px 15px;
            display: flex;
            flex-direction: column; /* Изменено для текста сверху */
            gap: 5px;
            box-shadow: 0 8px 0 #856404;
        }

        /* Надпись СЕЗОН */
        .pass-season-label {
            font-family: 'Arial Black', sans-serif;
            color: #000;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            margin-left: 5px;
        }

        .pass-main-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .pass-ticket-icon { 
            width: 55px; 
            filter: drop-shadow(3px 3px 0 #000); 
        }

        .pass-xp-container {
            flex-grow: 1;
            background: #664400; /* Темно-золотой фон как на скрине */
            border-radius: 10px;
            height: 28px;
            position: relative;
            border: 3px solid #000;
            overflow: hidden;
        }

        .pass-xp-fill {
            height: 100%;
            width: 0%;
            background: #0099ff; /* Голубой цвет прогресса как на скрине */
            transition: width 0.5s;
        }

        .pass-xp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000;
            line-height: 22px;
            z-index: 2;
        }

        /* МОДАЛКА ЛЮДИ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="logo" style="font-weight: 900; color: #fff; letter-spacing: 2px;">GYAZ RUSH</div>
        
        <nav class="menu-tabs">
            <div class="tab-item active" onclick="selectTab('news')">НОВОСТИ</div>
            <div class="tab-item" onclick="selectTab('shop')">МАГАЗИН</div>
            <div class="tab-item" onclick="selectTab('club')">КЛУБ</div>
            <div class="tab-item" onclick="selectTab('draft')">DRAFT</div>
            <div class="tab-item" onclick="selectTab('market')">РЫНОК</div>
            <div class="tab-item" onclick="selectTab('betting')">СТАВКИ</div>
            <div class="tab-item" onclick="openOnline()" style="color: #e1b12c; font-weight: bold;">ЛЮДИ</div>
        </nav>

        <div class="right-side" style="display: flex; align-items: center;">
            <div class="business-container" onclick="collectBusinessMoney()">
                <span class="business-label">Бизнес</span>
                <span id="business-display" class="business-money">0 / 6000 CY</span>
            </div>
            <div id="shop-balance" style="background: #00ff88; color: #000; padding: 8px 15px; border-radius: 8px; font-weight: bold;">
                0 CY
            </div>
        </div>
    </header>

    <div class="pass-widget" onclick="window.location.href='gympass.html'">
        <div class="pass-card">
            <div class="pass-season-label">SPRING SEASON</div>
            <div class="pass-main-row">
                <img src="images/pass_ticket.png" class="pass-ticket-icon" alt="Pass">
                <div class="pass-xp-container">
                    <div class="pass-xp-text" id="widget-xp-text">0 / 1000</div>
                    <div class="pass-xp-fill" id="widget-xp-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="content-preview">
        <div id="preview-box" class="preview-container">
            <div class="info-side">
                <h2 id="pre-title">НОВОСТИ</h2>
                <p id="pre-desc">Загрузка последних событий...</p>
                <a href="#" id="pre-link" class="go-btn">ПЕРЕЙТИ В РЕЖИМ →</a>
            </div>
            <div class="image-side">
                <img src="Prewie/news.png" id="pre-img" alt="Preview">
            </div>
        </div>
    </main>

    <div id="online-modal" class="modal-overlay" onclick="closeOnline()">
        <div class="modal-content" onclick="event.stopPropagation()" style="width: 90%; max-width: 500px; background: #111; border-radius: 20px;">
            <iframe src="online.html" style="width: 100%; height: 500px; border: none;"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function updateWidgetXP() {
            const xp = parseInt(localStorage.getItem('playerXP')) || 0;
            const xpPerLevel = 1000;
            const currentXP = xp % xpPerLevel;
            const percent = (currentXP / xpPerLevel) * 100;
            
            const fill = document.getElementById('widget-xp-fill');
            const text = document.getElementById('widget-xp-text');
            
            if(fill) fill.style.width = percent + "%";
            if(text) text.innerText = `${currentXP} / ${xpPerLevel}`;
        }

        // Обновляем баланс из localStorage
        function updateHubBalance() {
            const balance = localStorage.getItem('fixone_balance') || "0";
            const display = document.getElementById('shop-balance');
            if(display) display.innerText = parseInt(balance).toLocaleString() + " CY";
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateWidgetXP();
            updateHubBalance();
        });

        function openOnline() { document.getElementById('online-modal').style.display = 'flex'; }
        function closeOnline() { document.getElementById('online-modal').style.display = 'none'; }
    </script>
      <div class="audio-controls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999; display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;">
        <button onclick="this.innerText = (typeof toggleMute === 'function' && toggleMute()) ? '🔇' : '🎵'" style="background: none; border: none; font-size: 20px; cursor: pointer;">🎵</button>
        <input type="range" min="0" max="1" step="0.1" value="0.3" oninput="if(typeof setVolume === 'function') setVolume(this.value)" style="width: 60px; cursor: pointer;">
    </div>

    <script src="audio.js"></script>
</body>
</html>
