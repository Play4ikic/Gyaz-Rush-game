<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne FC - Hub</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для блока бизнеса и баланса */
        .business-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 15px;
            min-width: 120px;
        }
        .business-container:hover {
            background: rgba(0, 255, 136, 0.15);
            border-color: #00ff88;
            transform: translateY(-2px);
        }
        .business-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .business-money { color: #00ff88; font-weight: bold; font-family: monospace; font-size: 14px; }

        /* Навигация */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Модальное окно (Окно ЛЮДИ) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: none; /* Скрыто по умолчанию */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 90%;
            max-width: 500px;
            background: #111;
            border-radius: 20px;
            border: 1px solid #333;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .close-modal {
            position: absolute;
            top: 10px; right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 10001;
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="logo" style="font-weight: 900; color: #fff; letter-spacing: 2px; font-size: 20px;">GYaz Rush</div>
        
        <nav class="menu-tabs" style="display: flex; gap: 15px;">
            <div class="tab-item active" onclick="selectTab('news')">НОВОСТИ</div>
            <div class="tab-item" onclick="selectTab('shop')">МАГАЗИН</div>
            <div class="tab-item" onclick="selectTab('club')">КЛУБ</div>
            <div class="tab-item" onclick="selectTab('draft')">DRAFT</div>
            <div class="tab-item" onclick="selectTab('market')">РЫНОК</div>
            <div class="tab-item" onclick="selectTab('betting')">СТАВКИ</div>
            <div class="tab-item" onclick="openOnline()" style="color: #e1b12c; font-weight: bold;">ЛЮДИ</div>
        </nav>

        <div class="right-side" style="display: flex; align-items: center;">
            <div class="business-container" onclick="collectBusinessMoney()">
                <span class="business-label">Бизнес (Собрать)</span>
                <span id="business-display" class="business-money">0 / 6000 CY</span>
            </div>
            
            <div id="shop-balance" class="balance-display" style="background: #00ff88; color: #000; padding: 8px 15px; border-radius: 8px; font-weight: bold;">
                0 CY
            </div>
        </div>
    </header>

    <div id="online-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOnline()">&times;</span>
            <iframe src="online.html" style="width: 100%; height: 500px; border: none; border-radius: 20px;"></iframe>
        </div>
    </div>

    <main class="content-preview">
        <div id="preview-box" class="preview-container">
            <div class="info-side">
                <h2 id="pre-title">НОВОСТИ</h2>
                <p id="pre-desc">Загрузка последних событий...</p>
                <a href="#" id="pre-link" class="go-btn">ПЕРЕЙТИ В РЕЖИМ →</a>
            </div>
            <div class="image-side">
                <div class="img-wrapper">
                    <img src="Prewie/news.png" id="pre-img" alt="Preview">
                </div>
            </div>
        </div>
    </main>

    <div class="audio-controls" style="position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 30px;">
        <button id="mute-btn" onclick="toggleMuteUI(this)" style="background: none; border: none; font-size: 20px; cursor: pointer; color: white;">🎵</button>
        <input type="range" min="0" max="1" step="0.1" value="0.3" oninput="setVolume(this.value)" style="width: 80px; accent-color: #00ff88;">
    </div>

    <script type="module" src="economy.js"></script>
    <script type="module" src="business.js"></script>
    <script src="audio.js"></script>
    <script src="script.js"></script>

    <script>
        // Функции открытия модалки
        function openOnline() {
            document.getElementById('online-modal').style.display = 'flex';
        }

        function closeOnline() {
            document.getElementById('online-modal').style.display = 'none';
        }

        function toggleMuteUI(btn) {
            if (typeof toggleMute === 'function') {
                const isMuted = toggleMute();
                btn.innerText = isMuted ? '🔇' : '🎵';
            }
        }
    </script>
</body>
</html>
