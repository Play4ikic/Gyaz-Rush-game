<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixOne FC - Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ВЕРХНЯЯ ПАНЕЛЬ НАВИГАЦИИ */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #222;
            position: relative;
            z-index: 100;
        }

        .menu-tabs { display: flex; gap: 15px; }
        
        .tab-item {
            color: #888;
            font-weight: 900;
            cursor: pointer;
            padding: 10px 15px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .tab-item.active { color: #fff; border-bottom: 3px solid #00ff88; }
        .tab-item:hover { color: #fff; }

        /* ВИДЖЕТ PASS (Левый нижний угол) */
        .pass-widget {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 210px;
            z-index: 1000;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .pass-widget:hover { transform: scale(1.05); }
        .pass-widget:active { transform: scale(0.95); }

        .pass-card {
            background: linear-gradient(180deg, #f1c40f 0%, #d4ac0d 100%);
            border: 4px solid #000;
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #856404;
        }

        .pass-ticket-icon { 
            width: 42px; 
            filter: drop-shadow(2px 2px 0 #000); 
        }

        .pass-xp-container {
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            height: 22px;
            position: relative;
            border: 2px solid #000;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .pass-xp-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pass-xp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 11px;
            font-weight: 900;
            text-shadow: 1px 1px 0 #000;
            z-index: 2;
            pointer-events: none;
        }

        /* ПАНЕЛЬ ПРЕВЬЮ */
        .content-preview {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
        }

        .preview-container {
            display: flex;
            width: 80%;
            max-width: 1000px;
            background: rgba(20,20,20,0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .info-side { padding: 40px; flex: 1; }
        .image-side { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        .image-side img { width: 100%; height: 100%; object-fit: cover; }

        .go-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #00ff88;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="logo" style="font-weight: 900; color: #fff; font-size: 20px;">GYAZ RUSH</div>
        
        <nav class="menu-tabs">
            <div class="tab-item active" onclick="selectTab('news')">НОВОСТИ</div>
            <div class="tab-item" onclick="selectTab('shop')">МАГАЗИН</div>
            <div class="tab-item" onclick="selectTab('club')">КЛУБ</div>
            <div class="tab-item" onclick="selectTab('draft')">DRAFT</div>
            <div class="tab-item" onclick="selectTab('market')">РЫНОК</div>
            <div class="tab-item" onclick="selectTab('pass')" style="color: #ffcc00;">PASS</div>
        </nav>

        <div id="shop-balance" style="background: #222; padding: 10px 20px; border-radius: 10px; font-weight: 900; color: #00ff88;">
            0 CY
        </div>
    </header>

    <div class="pass-widget" onclick="window.location.href='gympass.html'">
        <div class="pass-card">
            <img src="images/pass_ticket.png" class="pass-ticket-icon" alt="Ticket">
            <div class="pass-xp-container">
                <div class="pass-xp-text" id="widget-xp-text">0 / 1000</div>
                <div class="pass-xp-fill" id="widget-xp-fill"></div>
            </div>
        </div>
    </div>

    <main class="content-preview">
        <div id="preview-box" class="preview-container">
            <div class="info-side">
                <h2 id="pre-title" style="font-size: 32px; margin-bottom: 10px;">НОВОСТИ</h2>
                <p id="pre-desc" style="color: #aaa; line-height: 1.6;">Загрузка данных...</p>
                <a href="#" id="pre-link" class="go-btn">ИГРАТЬ</a>
            </div>
            <div class="image-side">
                <img src="Prewie/news.png" id="pre-img">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Функция обновления прогресса в виджете
        function updateWidgetXP() {
            const xp = parseInt(localStorage.getItem('playerXP')) || 0;
            const xpPerLevel = 1000;
            const currentXP = xp % xpPerLevel;
            const percent = (currentXP / xpPerLevel) * 100;

            const fill = document.getElementById('widget-xp-fill');
            const text = document.getElementById('widget-xp-text');
            
            if(fill) fill.style.width = percent + "%";
            if(text) text.innerText = `${currentXP} / ${xpPerLevel}`;
        }

        window.addEventListener('DOMContentLoaded', updateWidgetXP);
    </script>
</body>
</html>
