<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FixOne FC - Hub</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ВОЗВРАТ ПРЕЖНЕГО СТИЛЯ */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 100;
        }

        .business-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            min-width: 120px;
            margin-right: 15px;
        }

        .business-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .business-money { color: #00ff88; font-weight: bold; font-family: monospace; }

        /* УВЕЛИЧЕННЫЙ ВИДЖЕТ PASS (Левый нижний угол) */
        .pass-widget {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 280px; /* Увеличено с 200px */
            z-index: 1000;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .pass-widget:hover { transform: scale(1.05); }
        .pass-widget:active { transform: scale(0.95); }

        .pass-card {
            background: linear-gradient(180deg, #f1c40f 0%, #d4ac0d 100%);
            border: 5px solid #000; /* Утолщенная рамка */
            border-radius: 18px;
            padding: 15px; /* Увеличенные отступы */
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 0 #856404;
        }

        .pass-ticket-icon { 
            width: 60px; /* Увеличено с 40px */
            filter: drop-shadow(3px 3px 0 #000); 
        }

        .pass-xp-container {
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            height: 30px; /* Увеличено с 20px */
            position: relative;
            border: 3px solid #000;
            overflow: hidden;
        }

        .pass-xp-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            transition: width 0.5s;
        }

        .pass-xp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px; /* Крупнее текст */
            font-weight: 900;
            text-shadow: 2px 2px 0 #000;
            line-height: 24px;
            z-index: 2;
        }

        /* МОДАЛКА ЛЮДИ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="logo" style="font-weight: 900; color: #fff; letter-spacing: 2px;">GYAZ RUSH</div>
        
        <nav class="menu-tabs">
            <div class="tab-item active" onclick="selectTab('news')">НОВОСТИ</div>
            <div class="tab-item" onclick="selectTab('shop')">МАГАЗИН</div>
            <div class="tab-item" onclick="selectTab('club')">КЛУБ</div>
            <div class="tab-item" onclick="selectTab('draft')">DRAFT</div>
            <div class="tab-item" onclick="selectTab('market')">РЫНОК</div>
            <div class="tab-item" onclick="selectTab('betting')">СТАВКИ</div>
            <div class="tab-item" onclick="openOnline()" style="color: #e1b12c; font-weight: bold;">ЛЮДИ</div>
        </nav>

        <div class="right-side" style="display: flex; align-items: center;">
            <div class="business-container" onclick="collectBusinessMoney()">
                <span class="business-label">Загрузка...</span>
                <span id="business-display" class="business-money">0 / 6000 CY</span>
            </div>
            <div id="shop-balance" style="background: #00ff88; color: #000; padding: 8px 15px; border-radius: 8px; font-weight: bold;">
                0 CY
            </div>
        </div>
    </header>

    <div class="pass-widget" onclick="window.location.href='gympass.html'">
        <div class="pass-card">
            <img src="images/pass_ticket.png" class="pass-ticket-icon" alt="Pass">
            <div class="pass-xp-container">
                <div class="pass-xp-text" id="widget-xp-text">0 / 1000</div>
                <div class="pass-xp-fill" id="widget-xp-fill"></div>
            </div>
        </div>
    </div>

    <main class="content-preview">
        <div id="preview-box" class="preview-container">
            <div class="info-side">
                <h2 id="pre-title">НОВОСТИ</h2>
                <p id="pre-desc">Загрузка последних событий...</p>
                <a href="#" id="pre-link" class="go-btn">ПЕРЕЙТИ В РЕЖИМ →</a>
            </div>
            <div class="image-side">
                <img src="Prewie/news.png" id="pre-img" alt="Preview">
            </div>
        </div>
    </main>

    <div id="online-modal" class="modal-overlay" onclick="closeOnline()">
        <div class="modal-content" onclick="event.stopPropagation()" style="width: 90%; max-width: 500px; background: #111; border-radius: 20px;">
            <iframe src="online.html" style="width: 100%; height: 500px; border: none;"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function updateWidgetXP() {
            const xp = parseInt(localStorage.getItem('playerXP')) || 0;
            const xpPerLevel = 1000;
            const currentXP = xp % xpPerLevel;
            const percent = (currentXP / xpPerLevel) * 100;
            document.getElementById('widget-xp-fill').style.width = percent + "%";
            document.getElementById('widget-xp-text').innerText = `${currentXP} / ${xpPerLevel}`;
        }
        window.addEventListener('DOMContentLoaded', updateWidgetXP);
        function openOnline() { document.getElementById('online-modal').style.display = 'flex'; }
        function closeOnline() { document.getElementById('online-modal').style.display = 'none'; }
    </script>
</body>
</html>
