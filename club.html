<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GYaz Rush - Professional Squad</title>
    <link rel="stylesheet" href="club.css">
</head>
<body>
    <div class="main-background" style="background-image: url('images/baground.jpg');"></div>

    <header class="squad-header">
        <div class="left-meta">
            <a href="index.html" class="back-link">← HUB</a>
            <div class="team-info">
                <div class="rating-stars">Rating: <span id="avg-rating">AVG: 0</span> 
            </div>
        </div>
        <div class="right-meta">
        </div>
    </header>

    <main class="pitch-container" id="pitch-area">
        <div class="football-pitch">
            <div class="squad-row players-line">
                <div class="player-slot" id="slot-1" onclick="handleSlotClick(1)"><div class="slot-label">FLD</div></div>
                <div class="player-slot" id="slot-2" onclick="handleSlotClick(2)"><div class="slot-label">FLD</div></div>
                <div class="player-slot" id="slot-3" onclick="handleSlotClick(3)"><div class="slot-label">FLD</div></div>
                <div class="player-slot" id="slot-4" onclick="handleSlotClick(4)"><div class="slot-label">FLD</div></div>
            </div>
            <div class="squad-row goalkeeper-row">
                <div class="player-slot" id="slot-0" onclick="handleSlotClick(0)"><div class="slot-label">GK</div></div>
            </div>
        </div>
    </main>

    <button class="toggle-inventory-btn" onclick="toggleInventory()">⬇ СКРЫТЬ КЛУБ</button>

    <footer class="inventory-footer" id="inventory-panel">
        <div class="inventory-header">
            <span>MY CLUB PLAYERS</span>
            <button class="clear-btn" onclick="clearSquad()">ОЧИСТИТЬ ВСЕ</button>
        </div>
        <div id="club-inventory" class="inventory-scroll"></div>
    </footer>

    <script src="club.js"></script>
</body>
</html>
<div class="audio-controls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999; display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;">
    <button onclick="this.innerText = toggleMute() ? '🔇' : '🎵'" style="background: none; border: none; font-size: 20px; cursor: pointer;">🎵</button>
    <input type="range" min="0" max="1" step="0.1" value="0.3" oninput="setVolume(this.value)" style="width: 60px; cursor: pointer;">
</div>

<script src="audio.js"></script>
