<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GYaz Rush - 1v1 Battle</title>
    <style>
        body { margin: 0; padding: 20px; background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; }
        .online-card { width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #e1b12c; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-size: 18px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; border-radius: 8px; }
        .player-row:hover { background: rgba(255, 255, 255, 0.05); }
        .player-info { display: flex; align-items: center; gap: 12px; }
        .nickname { font-weight: 600; font-size: 16px; }
        .btn-1v1 { background: #e1b12c; color: black; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 12px; text-transform: uppercase; }
        .btn-1v1:hover { background: #f1c40f; transform: scale(1.05); box-shadow: 0 0 15px rgba(225, 177, 44, 0.4); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .me-tag { font-size: 10px; background: #444; color: #fff; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="online-card">
        <h2>ВЫЗОВ НА БИТВУ 1v1</h2>
        <div id="players-container">
            <p style="text-align: center; color: #666;">Поиск игроков в сети...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set, onDisconnect, remove, off } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDq3-wPkua6nMUt3cetwwC_-4iVtx-7PiQ",
            authDomain: "play4ik-473ef.firebaseapp.com",
            projectId: "play4ik-473ef",
            databaseURL: "https://play4ik-473ef-default-rtdb.firebaseio.com", 
            appId: "1:115893557892:web:731ac77c3f00328c1200d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let userData = JSON.parse(localStorage.getItem('gyaz_user')) || { uid: "guest_" + Math.floor(Math.random()*1000), nickname: "Player" };

        // 1. Установка статуса онлайн
        const myStatusRef = ref(db, `all_players/${userData.uid}`);
        update(myStatusRef, { nickname: userData.nickname, online: true });
        onDisconnect(myStatusRef).update({ online: false });

        // 2. Отправка вызова (Хост)
        window.sendChallenge = function(targetId) {
            const matchId = "match_" + Date.now();
            const challengeRef = ref(db, `challenges/${targetId}`);
            
            set(challengeRef, {
                fromId: userData.uid,
                fromName: userData.nickname,
                matchId: matchId,
                status: "pending"
            });

            alert("Вызов отправлен! Ждем ответа...");

            // Слушаем ответ
            onValue(challengeRef, (snap) => {
                const val = snap.val();
                if (val && val.status === "accepted") {
                    off(challengeRef); // Отключаем слушатель
                    localStorage.setItem('currentMatchId', matchId);
                    localStorage.setItem('myRole', 'host');
                    // Прыгаем в основное окно
                    window.top.location.replace("draft.html"); 
                }
            });
        };

        // 3. Получение вызова (Гость)
        const myChallengeRef = ref(db, `challenges/${userData.uid}`);
        onValue(myChallengeRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                if (data.status === "pending") {
                    if (confirm(`Игрок ${data.fromName} вызывает тебя на бой! Принять?`)) {
                        localStorage.setItem('currentMatchId', data.matchId);
                        localStorage.setItem('myRole', 'guest');
                        
                        update(myChallengeRef, { status: "accepted" }).then(() => {
                            // Жесткое обновление всего окна
                            window.top.location.replace("draft.html");
                        });
                    } else {
                        remove(myChallengeRef);
                    }
                }
            }
        });

        // 4. Отрисовка списка игроков
        onValue(ref(db, 'all_players'), (snapshot) => {
            const container = document.getElementById('players-container');
            container.innerHTML = "";
            if (snapshot.exists()) {
                const players = snapshot.val();
                Object.keys(players).forEach(id => {
                    const p = players[id];
                    if (p.online) {
                        const isMe = id === userData.uid;
                        const row = document.createElement('div');
                        row.className = 'player-row';
                        row.innerHTML = `
                            <div class="player-info">
                                <div class="dot"></div>
                                <span class="nickname">${p.nickname} ${isMe ? '<span class="me-tag">ВЫ</span>' : ''}</span>
                            </div>
                            ${!isMe ? `<button class="btn-1v1" onclick="sendChallenge('${id}')">1v1</button>` : ''}
                        `;
                        container.appendChild(row);
                    }
                });
            }
            if (container.innerHTML === "") {
                container.innerHTML = '<p style="text-align: center; color: #666;">Никого нет в сети</p>';
            }
        });
    </script>
</body>
</html>
