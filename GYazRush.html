<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GYaz Rush - Ultimate Edition</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #game-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <script>
        const playlist = [
            "Music/6am - Channel Tres (EAFC 24 SOUNDTRACK).mp3",
            "Music/Going Kokomo - Royel Otis (EAFC 24 SOUNDTRACK).mp3",
            "Music/Mamgobhozi - Major Lazer & Major League Djz (ft. Brenda Fassie) (EAFC 24 SOUNDTRACK).mp3",
            "Music/seasidedemo - SEB (FIFA 22 Official Soundtrack).mp3",
            "Music/Worms - Ashnikko (EAFC 24 SOUNDTRACK).mp3"
        ];

        let currentTrackIndex = 0;
        const bgMusic = new Audio();
        bgMusic.volume = 0.3;

        function playNext() {
            bgMusic.src = playlist[currentTrackIndex];
            bgMusic.play().catch(() => console.log("Кликни по игре!"));
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        }

        bgMusic.onended = playNext;

        // Запуск при первом клике по ВСЕЙ игре
        document.addEventListener('click', () => {
            if (!bgMusic.src) playNext();
        }, { once: true });
    </script>

    <iframe src="index.html" id="game-frame"></iframe>

</body>
</html>
