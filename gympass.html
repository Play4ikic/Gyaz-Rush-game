<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY Pass: Spring Season</title>
    <style>
        :root {
            --dark-bg: #0a0a0a;
            --fixone-yellow: #ffcc00; 
            --claimed-green: #00ff88;
            --premium-grad: linear-gradient(135deg, #a55eea, #8e44ad);
            --free-grad: linear-gradient(135deg, #fed330, #f1c40f);
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Arial Black', sans-serif;
            color: white;
        }

        .pass-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* ШАПКА */
        .pass-header {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid #222;
            z-index: 100;
        }

        .balance-display {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border: 2px solid var(--fixone-yellow);
            border-radius: 10px;
            font-size: 16px;
            font-weight: 900;
        }

        .xp-bar-container { width: 300px; text-align: center; }
        .xp-bg { height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .xp-fill { height: 100%; width: 0%; background: var(--fixone-yellow); transition: 1s ease-out; }

        /* СКРОЛЛ И СЕТКА */
        .scroll-area { flex-grow: 1; overflow-x: auto; display: flex; align-items: center; }
        .track-wrapper { display: flex; min-width: max-content; padding: 0 100px 0 0; height: 100%; align-items: center; }

        .logos-column {
            position: sticky; left: 0; z-index: 90;
            background: rgba(10, 10, 10, 0.9);
            display: flex; flex-direction: column; gap: 150px;
            padding: 20px; border-right: 2px solid #333;
        }
        .logos-column img { width: 90px; height: 90px; object-fit: contain; }

        .levels-grid { display: flex; gap: 0; padding-left: 20px; }

        .level-column {
            display: flex; flex-direction: column; align-items: center;
            width: 180px; position: relative;
        }

        /* КАРТОЧКИ (ПЛИТКИ) */
        .tile {
            width: 120px; height: 120px;
            border-radius: 15px; border: 4px solid #000;
            position: relative; cursor: pointer;
            transition: 0.3s; z-index: 5;
            background-size: 85% !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .premium-tile { background: var(--premium-grad); margin-bottom: 25px; }
        .free-tile { background: var(--free-grad); margin-top: 25px; }

        .reward-label {
            position: absolute; bottom: -20px; width: 100%;
            text-align: center; font-size: 11px; text-shadow: 1px 1px 2px #000;
        }

        .tile.locked { filter: grayscale(1) brightness(0.4); cursor: default; }
        .tile.locked::after { content: "🔒"; position: absolute; top: 35%; left: 38%; font-size: 30px; }

        .tile.claimed::before {
            content: "✔"; position: absolute; top: -10px; left: -10px;
            width: 35px; height: 35px; background: var(--claimed-green);
            border: 3px solid #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #000; z-index: 10;
        }

        /* ЛИНИИ И УЗЛЫ */
        .node-row {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 60px; position: relative;
        }
        .connector { position: absolute; left: 50%; width: 180px; height: 6px; background: #333; z-index: 1; }
        .connector.active { background: var(--fixone-yellow); box-shadow: 0 0 10px var(--fixone-yellow); }
        
        .node {
            width: 45px; height: 45px; background: #222; border: 4px solid #444;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; z-index: 10;
        }
        .node.active { background: var(--fixone-yellow); color: #000; border-color: #fff; }

        /* МОДАЛКИ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; 
            align-items: center; z-index: 1000; backdrop-filter: blur(5px);
        }
        .buy-menu { background: #111; border: 3px solid var(--fixone-yellow); padding: 30px; border-radius: 20px; text-align: center; width: 300px; }
        .buy-btn { width: 100%; padding: 12px; background: #00ff88; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 15px; }

        .exit-btn { position: absolute; top: 25px; left: 25px; font-size: 30px; color: #fff; text-decoration: none; z-index: 200; }
    </style>
</head>
<body>

<div class="modal-overlay" id="reveal-screen">
    <div style="text-align: center;">
        <h1 style="color: var(--fixone-yellow); margin-bottom: 20px;">НОВАЯ НАГРАДА!</h1>
        <img id="reveal-img" src="" style="width: 280px; filter: drop-shadow(0 0 20px gold);">
        <button class="buy-btn" onclick="closeReveal()" style="width: 220px; background: white; color: black; margin-top: 30px;">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="modal-overlay" id="buy-modal">
    <div class="buy-menu">
        <h2 style="color: var(--fixone-yellow); margin-top: 0;">АКТИВАЦИЯ PASS+</h2>
        <img src="images/Pass+.png" style="width: 120px; margin: 10px 0;">
        <p style="color: #bbb;">Разблокируйте эксклюзивные награды!</p>
        <p style="font-size: 28px; color: #00ff88; margin: 15px 0; font-weight: 900;">5 000 000 CY</p>
        <button class="buy-btn" onclick="confirmPurchase()">КУПИТЬ</button>
        <p onclick="closeBuyMenu()" style="margin-top:20px; cursor:pointer; color:#666;">ПОЗЖЕ</p>
    </div>
</div>

<div class="pass-container">
    <a href="index.html" class="exit-btn">←</a>

    <header class="pass-header">
        <div class="balance-display" id="user-money-display">0 CY</div>
        
        <div class="xp-bar-container">
            <div class="season-title">SPRING SEASON</div>
            <div class="xp-bg"><div class="xp-fill" id="xp-fill"></div></div>
            <div id="xp-text" style="font-size: 14px; margin-top: 6px; font-weight: 900;">LVL 1 | 0 / 1000 XP</div>
        </div>
        
        <div style="width: 120px;"></div> 
    </header>

    <main class="scroll-area">
        <div class="track-wrapper">
            <div class="logos-column">
                <img src="images/Pass+.png" id="pass-plus-logo" onclick="openBuyMenu()">
                <img src="images/Pass.png">
            </div>
            <div class="levels-grid" id="pass-grid"></div>
        </div>
    </main>

    <footer class="pass-footer">
        <button class="menu-btn active">НАГРАДЫ</button>
        <button class="menu-btn" onclick="window.location.href='quests.html'">ЗАДАНИЯ</button>
    </footer>
</div>

<script>
    const goldPlayers = [
        { name: 'Ayla', folder: 'Gold', file: 'Ayla-30.png' },
        { name: 'Raul', folder: 'Gold', file: 'Raul-3.png' },
        { name: 'Selim', folder: 'Gold', file: 'Selim-68.png' },
        { name: 'Chaxangir', folder: 'Gold', file: 'Chaxangir-68.png' },
        { name: 'Bayturan', folder: 'Gold', file: 'Bayturan-85.png' },
        { name: 'Eldjan', folder: 'Gold', file: 'Elcan-92.png' },
        { name: 'Nazrin', folder: 'Gold', file: 'Nazrin-82.png' },
        { name: 'Turqay', folder: 'Gold', file: 'Turqay-92.png' },
        { name: 'Tuncay', folder: 'Gold', file: 'Tuncay-90.png' },
        { name: 'Bugday', folder: 'Gold', file: 'Bugday-87.png' }
    ];

    const totyPlayers = [
        { name: 'Eldjan', folder: 'Toty', file: 'Elcan-97.png' },
        { name: 'Turqay', folder: 'Toty', file: 'Turqay-97.png' },
        { name: 'Tuncay', folder: 'Toty', file: 'Tuncay-97.png' },
        { name: 'Bugday', folder: 'Toty', file: 'Bugday-95.png' },
        { name: 'Nazrin', folder: 'Toty', file: 'Nazrin-91.png' }
    ];

    const championsPlayers = [
        { name: 'Eldjan', folder: 'Champions', file: 'Elcan-96.png' },
        { name: 'Turqay', folder: 'Champions', file: 'Turqay-96.png' },
        { name: 'Tuncay', folder: 'Champions', file: 'Tuncay-91.png' },
        { name: 'Bugday', folder: 'Champions', file: 'Bugday-90.png' },
        { name: 'Nazrin', folder: 'Champions', file: 'Nazrin-88.png' }
    ];

    const PASS_DATA = {
        1: { 
            free: { type: 'pack', id: 'champions', img: 'images/champions league.jpg', label: 'UCL PACK' }, 
            premium: { type: 'pack', id: 'toty', img: 'images/toty.jpg', label: 'TOTY PACK' } 
        },
        2: { 
            free: { type: 'money', amount: 5000, img: 'images/CY.png', label: '5 000 X' }, 
            premium: { type: 'money', amount: 10000, img: 'images/CY2.png', label: '10 000 X' } 
        },
        3: { 
            free: { type: 'pack', id: 'gold', img: 'images/gold.png', label: 'GOLD PACK' }, 
            premium: { type: 'pack', id: 'champions', img: 'images/champions league.jpg', label: 'UCL PACK' } 
        },
        4: { 
            free: { type: 'money', amount: 5000, img: 'images/CY.png', label: '5 000 X' }, 
            premium: { type: 'money', amount: 10000, img: 'images/CY2.png', label: '10 000 X' } 
        },
        5: { 
            free: { type: 'pack', id: 'gold', img: 'images/gold.png', label: 'GOLD PACK' }, 
            premium: { type: 'pack', id: 'champions', img: 'images/champions league.jpg', label: 'UCL PACK' } 
        },
        6: { 
            free: { type: 'money', amount: 5000, img: 'images/CY.png', label: '5 000 X' }, 
            premium: { type: 'money', amount: 10000, img: 'images/CY2.png', label: '10 000 X' } 
        },
        7: { 
            free: { type: 'pack', id: 'gold', img: 'images/gold.png', label: 'GOLD PACK' }, 
            premium: { type: 'pack', id: 'champions', img: 'images/champions league.jpg', label: 'UCL PACK' } 
        },
        8: { 
            free: { type: 'money', amount: 5000, img: 'images/CY.png', label: '5 000 X' }, 
            premium: { type: 'money', amount: 10000, img: 'images/CY2.png', label: '10 000 X' } 
        },
        9: { 
            free: { type: 'pack', id: 'gold', img: 'images/gold.png', label: 'GOLD PACK' }, 
            premium: { type: 'pack', id: 'champions', img: 'images/champions league.jpg', label: 'UCL PACK' } 
        },
        10: { 
            free: { type: 'player', name: 'Tuncay', folder: 'Champions', file: 'Tuncay-91.png', img: 'Champions/Tuncay-91.png', label: 'TUNCAY UCL' }, 
            premium: { type: 'player', name: 'Turqay', folder: 'Toty', file: 'Turqay-97.png', img: 'Toty/Turqay-97.png', label: 'TURQAY TOTY' } 
        }
    };

    const player = {
        money: parseInt(localStorage.getItem('fixone_balance')) || 0,
        xp:parseInt(localStorage.getItem('playerXP')) || 0,
        xpPerLevel: 2000,
        hasPremium: localStorage.getItem('hasPassPlus') === 'true',
        claimed: JSON.parse(localStorage.getItem('claimedRewards')) || []
    };

    function init() {
        renderLevels();
        updateUI();
    }

    function renderLevels() {
        const grid = document.getElementById('pass-grid');
        grid.innerHTML = "";
        const currentLvl = Math.floor(player.xp / player.xpPerLevel) + 1;

        for (let i = 1; i <= 10; i++) {
            const lvlData = PASS_DATA[i]; 
            const col = document.createElement('div');
            col.className = 'level-column';

            col.appendChild(createTile(i, 'premium', currentLvl, lvlData.premium));
            
            const nodeRow = document.createElement('div');
            nodeRow.className = 'node-row';
            if (i < 10) {
                const conn = document.createElement('div');
                conn.className = `connector ${i < currentLvl ? 'active' : ''}`;
                nodeRow.appendChild(conn);
            }
            const node = document.createElement('div');
            node.className = `node ${i <= currentLvl ? 'active' : ''}`;
            node.innerText = i;
            nodeRow.appendChild(node);
            col.appendChild(nodeRow);

            col.appendChild(createTile(i, 'free', currentLvl, lvlData.free));
            grid.appendChild(col);
        }
    }

    function createTile(lvl, type, currentLvl, config) {
        const tile = document.createElement('div');
        const id = `${type}-${lvl}`;
        tile.className = `tile ${type}-tile`;
        tile.style.background = `url('${config.img}')`;

        const label = document.createElement('span');
        label.className = 'reward-label';
        label.innerText = config.label;
        tile.appendChild(label);

        if (type === 'premium' && !player.hasPremium) tile.classList.add('locked');
        if (player.claimed.includes(id)) tile.classList.add('claimed');

        tile.onclick = () => {
            if (type === 'premium' && !player.hasPremium) { openBuyMenu(); return; }
            if (lvl > currentLvl) { alert("Недостаточно XP для этого уровня!"); return; }
            if (player.claimed.includes(id)) return;
            handleReward(config, id, tile);
        };
        return tile;
    }

    function handleReward(config, id, tile) {
        player.claimed.push(id);
        localStorage.setItem('claimedRewards', JSON.stringify(player.claimed));
        tile.classList.add('claimed');

        if (config.type === 'money') {
            player.money += config.amount;
            saveMoney();
            alert(`Получено ${config.amount} CY!`);
        } else if (config.type === 'player') {
            saveToInventory(config);
            showReveal(config.img);
        } else if (config.type === 'pack') {
            let pool = [];
            if (config.id === 'gold') pool = goldPlayers;
            else if (config.id === 'champions') pool = championsPlayers;
            else if (config.id === 'toty') pool = totyPlayers;

            const dropped = pool[Math.floor(Math.random() * pool.length)];
            saveToInventory(dropped);
            showReveal(`${dropped.folder}/${dropped.file}`);
        }
        updateUI();
    }

    function saveToInventory(p) {
        let inv = JSON.parse(localStorage.getItem('myPlayers')) || [];
        inv.push({ name: p.name, folder: p.folder, file: p.file });
        localStorage.setItem('myPlayers', JSON.stringify(inv));
    }

    function showReveal(imgSrc) {
        document.getElementById('reveal-img').src = imgSrc;
        document.getElementById('reveal-screen').style.display = 'flex';
    }

    window.closeReveal = () => document.getElementById('reveal-screen').style.display = 'none';

    function saveMoney() {
        localStorage.setItem('fixone_balance', player.money.toString());
    }

    function updateUI() {
        document.getElementById('user-money-display').innerText = player.money.toLocaleString() + " CY";
        const lvl = Math.floor(player.xp / player.xpPerLevel) + 1;
        const prog = (player.xp % player.xpPerLevel) / player.xpPerLevel * 100;
        document.getElementById('xp-fill').style.width = prog + "%";
        document.getElementById('xp-text').innerText = `LVL ${lvl} | ${player.xp % player.xpPerLevel} / ${player.xpPerLevel} XP`;
        
        if (player.hasPremium) {
            document.getElementById('pass-plus-logo').style.filter = "drop-shadow(0 0 15px gold) brightness(1.2)";
        }
    }

    function openBuyMenu() { 
        if (player.hasPremium) return;
        document.getElementById('buy-modal').style.display = 'flex'; 
    }

    function closeBuyMenu() { document.getElementById('buy-modal').style.display = 'none'; }

    function confirmPurchase() {
        if (player.money >= 5000000) {
            player.money -= 5000000;
            player.hasPremium = true;
            saveMoney();
            localStorage.setItem('hasPassPlus', 'true');
            renderLevels();
            updateUI();
            closeBuyMenu();
            alert("Pass+ активирован!");
        } else {
            alert("Недостаточно CY! Нужно 5 000 000.");
        }
    }

    window.onload = init;
</script>

<div class="audio-controls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999; display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;">
    <button onclick="this.innerText = (typeof toggleMute === 'function' && toggleMute()) ? '🔇' : '🎵'" style="background: none; border: none; font-size: 20px; cursor: pointer;">🎵</button>
    <input type="range" min="0" max="1" step="0.1" value="0.3" oninput="if(typeof setVolume === 'function') setVolume(this.value)" style="width: 60px; cursor: pointer;">
</div>

<script src="audio.js"></script>
</body>
</html>
